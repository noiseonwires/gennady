name: Build and Publish Docker Image

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-multiarch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so `git describe` can derive the dev version.
          fetch-depth: 0

      - name: Compute version
        id: version
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            # Tagged build: use the tag without a leading 'v'.
            VERSION="${GITHUB_REF_NAME#v}"
          else
            # Untagged dev build: <last-tag>-<commits-since>-dev (e.g. 1.0.2-5-dev).
            LAST_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
            if [ -n "${LAST_TAG}" ]; then
              COMMITS="$(git rev-list "${LAST_TAG}..HEAD" --count)"
              VERSION="${LAST_TAG#v}-${COMMITS}-dev"
            else
              COMMITS="$(git rev-list HEAD --count)"
              VERSION="0.0.0-${COMMITS}-dev"
            fi
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Computed version: ${VERSION}"

      # Buildx provides multi-platform build; no QEMU step needed
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image name
        id: img
        # GHCR requires a lowercase path; derive it from the repository this
        # workflow runs in so the image name follows owner/repo automatically.
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate build metadata
        id: build_meta
        run: |
          echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build & Push (multi-arch without emulation)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          # Request multiple target platforms
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GO_VERSION=1.26.3
            GIT_COMMIT=${{ steps.build_meta.outputs.SHORT_SHA }}
            BUILD_TIME=${{ steps.build_meta.outputs.BUILD_TIME }}
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@0.35.0
        with:
            image-ref: ${{ steps.img.outputs.name }}@${{ steps.build.outputs.digest }}
            format: table
            ignore-unfixed: true
            vuln-type: os,library
          